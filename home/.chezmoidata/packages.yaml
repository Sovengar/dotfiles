packages:
  # Use string for silent install (default):
  #   - winget.id
  # Use object with interactive: true to prompt before installing:
  #   - id: winget.id
  #     interactive: true
  core:
    winget:
      - Microsoft.WindowsTerminal
      - RARLab.WinRAR
      - id: Dropbox.Dropbox
        interactive: true
      - id: Google.GoogleDrive
        interactive: true
      - Microsoft.OneDrive
      - PuTTY.PuTTY

  dev:
    winget:
      - Microsoft.PowerShell
      - Git.Git
      - id: GitHub.GitHubDesktop
        shortcut: true
      - GitHub.cli
      - id: Microsoft.VisualStudioCode
        shortcut: true
      - Neovim.Neovim
      - id: wez.wezterm.nightly
        shortcut: true
      - Starship.Starship
      - jdx.mise
      - DEVCOM.JetBrainsMonoNerdFont
      - id: JetBrains.IntelliJIDEA
        shortcut: true
        version_strategy: stable
      - id: Bruno.Bruno
        shortcut: true
      - id: DBeaver.DBeaver.Community
        shortcut: true
      - id: beekeeper-studio.beekeeper-studio
        shortcut: true
      - id: RedHat.Podman
        shortcut: true
      - id: Docker.DockerDesktop
        shortcut: true
      - id: DEVCOM.JMeter
        shortcut: true
      - id: SmartBear.SoapUI
        shortcut: true
      - id: WinSCP.WinSCP
        shortcut: true
      - JesseDuffield.lazygit
      - OpenAI.Codex
      - GitKraken.cli
      - GLab.GLab
      - sharkdp.hyperfine
      - sharkdp.pastel
      - jj-vcs.jj
      - sxyazi.yazi
      - Dystroy.broot
      - id: Google.Antigravity
        shortcut: true
      - Clement.bottom
      - BurntSushi.ripgrep.MSVC
      - sharkdp.fd
      - Junegunn.fzf
      - ajeetdsouza.zoxide
      - sharkdp.bat
      - eza-community.eza
      - charmbracelet.crush
      - jqlang.jq
      - Orange-OpenSource.Hurl
    npm_global:
      - "@openai/codex"
      - backlog.md
      - "@devcontainers/cli"
      - tree-sitter-cli
      - kill-port
      - "@usebruno/cli"
      - http-server
      - pm2
      - snyk
      - portless
    bun_global:
      - opencode-ai
    go_install:
      - "github.com/edouard-claude/snip/cmd/snip@latest"
      - "github.com/sorenisanerd/gotty@latest"
    gh_extensions:
      - dlvhdr/gh-dash
      - github/gh-copilot

    ps_modules:
      - PSFzf
    manual_downloads:
      - name: "JMeter"
        url: "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.zip"
        archive: true
        dest: "dev\\tooling\\jmeter"
        shortcut: true
      - name: "JD-GUI"
        url: "https://github.com/java-decompiler/jd-gui/releases/download/v1.6.6/jd-gui-1.6.6.jar"
        archive: false
        dest: "dev\\tooling\\jd-gui"
        shortcut: true
      - name: "VisualVM"
        url: "https://github.com/oracle/visualvm/releases/download/2.1.10/visualvm_2110.zip"
        archive: true
        dest: "dev\\tooling\\visualvm"
        shortcut: true

  user:
    winget:
      - Bopsoft.Listary
      - Microsoft.PowerToys
      - Skillbrains.Lightshot
      - id: Discord.Discord
        interactive: true
      - id: VideoLAN.VLC
        interactive: true
      - id: AIMP.AIMP
        interactive: true
      - id: Plex.Plex
        interactive: true
      - id: BitSum.ProcessLasso
        interactive: true
      - id: AutoHotkey.AutoHotkey
        interactive: true
      - id: BartelsMedia.MacroRecorder
        interactive: true
      - cjpais.Handy
      - id: flux.flux
        interactive: true

  gaming:
    winget:
      - id: Valve.Steam
        interactive: true
      - id: Valve.SteamLink
        interactive: true
      - id: Guru3D.Afterburner
        interactive: true
      - id: Guru3D.RTSS
        interactive: true
      - id: Reshade.Setup.AddonsSupport
        interactive: true

  security:
    winget:
      - id: Malwarebytes.Malwarebytes
        interactive: true

scripts:
  prerequisites:
    - "Set-ExecutionPolicy RemoteSigned -Scope LocalMachine -Force"
  ssh_template:
    enabled: true
  lazyvim:
    repo: "https://github.com/LazyVim/starter"
    dest: "~/.config/nvim"
  wsl_opencode:
    command: "curl -fsSL https://opencode.ai/install | bash"
  startup_shortcuts:
    - source: "$HOME\\Dropbox\\Programs\\Mechvibes.lnk"
    - source: "$HOME\\Dropbox\\Programs\\z Boilerplate\\TaskbarX.lnk"
